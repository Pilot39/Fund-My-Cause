receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: 'otel-collector'
          scrape_interval: 10s
          static_configs:
            - targets: ['localhost:8888']

  jaeger:
    protocols:
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_http:
        endpoint: 0.0.0.0:14268

  zipkin:
    endpoint: 0.0.0.0:9411

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  attributes:
    actions:
      - key: environment
        value: production
        action: upsert
      - key: service.namespace
        value: fund-my-cause
        action: upsert

  resource:
    attributes:
      - key: service.name
        value: fund-my-cause
        action: upsert
      - key: deployment.environment
        value: production
        action: upsert

  spanmetrics:
    metrics_aggregation_type: 'cumulative'
    metrics_emission_period: 15s
    service_name_attribute: service.name

  sampling:
    policies:
      - name: low-volume-traces
        type: probabilistic
        probabilistic:
          sampling_percentage: 100
      - name: high-volume-traces
        type: probabilistic
        probabilistic:
          sampling_percentage: 10

exporters:
  jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  prometheus:
    endpoint: '0.0.0.0:8888'
    namespace: 'otel'
    const_labels:
      environment: production
      service: fund-my-cause

  logging:
    loglevel: info

  otlp:
    client:
      endpoint: localhost:4317
      tls:
        insecure: true

service:
  pipelines:
    traces:
      receivers:
        - otlp
        - jaeger
        - zipkin
      processors:
        - memory_limiter
        - attributes
        - resource
        - batch
      exporters:
        - jaeger
        - logging

    metrics:
      receivers:
        - otlp
        - prometheus
      processors:
        - memory_limiter
        - attributes
        - resource
        - batch
      exporters:
        - prometheus
        - logging

  extensions:
    - health_check
    - pprof
