name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/interface/**'
      - 'apps/components-lib/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/frontend_ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/interface/**'
      - 'apps/components-lib/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/interface/node_modules
            apps/components-lib/node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      - name: Install dependencies
        run: npm ci

      - name: Lint (root)
        run: npm run lint

      - name: Lint (apps/interface)
        working-directory: apps/interface
        run: npx eslint src --max-warnings 0

      - name: Lint (apps/components-lib)
        working-directory: apps/components-lib
        run: npx eslint src --max-warnings 0

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/interface/node_modules
            apps/components-lib/node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (apps/interface)
        working-directory: apps/interface
        run: npx tsc --noEmit

      - name: Typecheck (apps/components-lib)
        working-directory: apps/components-lib
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/interface/node_modules
            apps/components-lib/node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      - name: Install dependencies
        run: npm ci

      - name: Run tests (apps/interface)
        working-directory: apps/interface
        run: npm run test:coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/interface/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            apps/interface/node_modules
            apps/components-lib/node_modules
          key: ${{ runner.os }}-node20-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build (apps/interface)
        working-directory: apps/interface
        run: npm run build

      - name: Verify build output
        working-directory: apps/interface
        run: |
          if [ ! -d ".next" ]; then
            echo "Build failed: .next directory not found"
            exit 1
          fi
          echo "Build successful"

      - name: Audit dependencies
        working-directory: apps/interface
        run: npm audit --audit-level=high || true

      - name: Check bundle budgets
        working-directory: apps/interface
        run: npm run bundle:check

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/interface/.next
          retention-days: 7
