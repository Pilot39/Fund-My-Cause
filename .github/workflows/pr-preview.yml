name: PR Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'apps/interface/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  # ── Deploy preview (on open / update) ─────────────────────────────────────
  deploy-preview:
    name: Deploy preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-preview-${{ github.event.pull_request.number }}
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        working-directory: apps/interface
        run: npm run build
        env:
          NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.PREVIEW_CONTRACT_ID || 'preview-contract-id' }}
          NEXT_PUBLIC_RPC_URL: ${{ secrets.PREVIEW_RPC_URL || 'https://soroban-testnet.stellar.org' }}
          NEXT_PUBLIC_NETWORK_PASSPHRASE: 'Test SDF Network ; September 2015'

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          npm install -g vercel@latest
          DEPLOY_URL=$(vercel deploy apps/interface \
            --token "$VERCEL_TOKEN" \
            --yes \
            --env NEXT_PUBLIC_CONTRACT_ID="${{ secrets.PREVIEW_CONTRACT_ID || 'preview-contract-id' }}" \
            --env NEXT_PUBLIC_RPC_URL="${{ secrets.PREVIEW_RPC_URL || 'https://soroban-testnet.stellar.org' }}" \
            --env NEXT_PUBLIC_NETWORK_PASSPHRASE="Test SDF Network ; September 2015" \
            2>&1 | tail -1)
          echo "preview-url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Post preview URL comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deployment
          message: |
            ## 🚀 Preview Deployment

            | | |
            |---|---|
            | **Status** | ✅ Ready |
            | **Preview URL** | ${{ steps.deploy.outputs.preview-url }} |
            | **Commit** | ${{ github.sha }} |

            > Preview will be removed when this PR is closed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Tear down on PR close ─────────────────────────────────────────────────
  teardown-preview:
    name: Tear down preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove Vercel preview deployment
        run: |
          # List and remove all deployments for this PR's branch
          DEPLOYMENTS=$(curl -s \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&meta-githubPrId=${{ github.event.pull_request.number }}&limit=20" \
            | jq -r '.deployments[].uid // empty')

          for uid in $DEPLOYMENTS; do
            echo "Removing deployment: $uid"
            curl -s -X DELETE \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$uid" || true
          done
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Update PR comment — preview removed
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deployment
          message: |
            ## 🚀 Preview Deployment

            | | |
            |---|---|
            | **Status** | 🗑️ Removed |
            | **Reason** | PR closed |
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
