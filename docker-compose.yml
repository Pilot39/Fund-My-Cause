services:
  # ── Stellar local network (quickstart) ──────────────────────────────────────
  stellar:
    image: stellar/quickstart:latest
    command: --local --enable-soroban-rpc
    ports:
      - "8000:8000"   # Horizon + Soroban RPC
    environment:
      - NETWORK=local
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Frontend (production image) ──────────────────────────────────────────────
  interface:
    build:
      context: .
      dockerfile: apps/interface/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SOROBAN_RPC_URL=${NEXT_PUBLIC_SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      - NEXT_PUBLIC_CONTRACT_ID=${NEXT_PUBLIC_CONTRACT_ID:-}
      - NEXT_PUBLIC_NETWORK_PASSPHRASE=${NEXT_PUBLIC_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}
    env_file:
      - path: apps/interface/.env.local
        required: false
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      stellar:
        condition: service_healthy

  # ── Frontend dev server (hot reload) ────────────────────────────────────────
  interface-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev"
    ports:
      - "3001:3000"
    volumes:
      - ./apps/interface:/app          # live source mount
      - interface_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SOROBAN_RPC_URL=${NEXT_PUBLIC_SOROBAN_RPC_URL:-http://stellar:8000/soroban/rpc}
      - NEXT_PUBLIC_CONTRACT_ID=${NEXT_PUBLIC_CONTRACT_ID:-}
      - NEXT_PUBLIC_NETWORK_PASSPHRASE=${NEXT_PUBLIC_NETWORK_PASSPHRASE:-Standalone Network ; February 2017}
    env_file:
      - path: apps/interface/.env.local
        required: false
    depends_on:
      stellar:
        condition: service_healthy
    profiles:
      - dev                            # only started with: docker compose --profile dev up

volumes:
  interface_node_modules:

  # ── Indexer service ─────────────────────────────────────────────────────────
  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    ports:
      - "3002:3001"
    environment:
      - SOROBAN_RPC_URL=${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org:443}
      - CROWDFUND_CONTRACT_ID=${NEXT_PUBLIC_CONTRACT_ID:-}
      - PORT=3001
      - LOG_LEVEL=info
    env_file:
      - path: services/indexer/.env
        required: false
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    depends_on:
      stellar:
        condition: service_healthy
    profiles:
      - indexer                        # only started with: docker compose --profile indexer up
